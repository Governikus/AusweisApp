name: CI_build

"on": [push, pull_request]

env:
  BUILD_DIR_APP: "../_build"

jobs:

  build_windows:

    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_configuration: [Release]
        build_platform: ["Ninja"]

    steps:

      - name: Install openssl dev, ninja, wix
        run: |
          choco install openssl --version=3.6.2
          choco install ninja
          dotnet tool install --global wix

      - name: Add nmake
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: checkout files with lineending LF to overcome issue with yamllint on windows
        run: |
          git config --global core.autocrlf false

      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          modules: 'qtscxml qtwebsockets qtshadertools qtconnectivity qtimageformats'
          setup-python: 'false'

      - name: vcpkg build
        uses: johnwason/vcpkg-action@v8
        id: vcpkg
        with:
          pkgs: llhttp
          triplet: x64-windows-release
          token: ${{ github.token }}

      - name: generate cmake
        run: |
          cmake ${{ steps.vcpkg.outputs.vcpkg-cmake-config }} -G "${{ matrix.build_platform }}" `
                -DCMAKE_BUILD_TYPE="${{ matrix.build_configuration }}" -B "${{ env.BUILD_DIR_APP }}"

      - name: build cmake
        run: |
          cmake --build "${{ env.BUILD_DIR_APP }}" --config ${{ matrix.build_configuration }} --target package
          cmake --install "${{ env.BUILD_DIR_APP }}"

      - name: run ctest
        run: |
          ctest --test-dir ${{ env.BUILD_DIR_APP }} --output-on-failure -C "${{ matrix.build_configuration }}" --output-junit junit.xml

      - name: Report Test results
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: ctest Tests
          path: ${{ env.BUILD_DIR_APP }}/junit.xml
          reporter: java-junit


  build_linux:

    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix:
        build_configuration: [Release]
        build_platform: ["Ninja"]

    steps:
      - uses: actions/checkout@v7

      - name: Install packages via apt
        run: |
          sudo apt update -qq && sudo apt install -y cmake pkg-config libssl-dev libudev-dev libllhttp-dev libpcsclite-dev \
                                                     libgl1-mesa-dev qt6-l10n-tools ninja-build

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          modules: 'qtscxml qtwebsockets qtshadertools qtconnectivity'
          setup-python: 'false'

      - name: generate cmake
        run: |
          cmake -G "${{ matrix.build_platform }}" -DCMAKE_BUILD_TYPE="${{ matrix.build_configuration }}" -B ${{ env.BUILD_DIR_APP }}

      - name: build cmake
        run: |
          cmake --build ${{ env.BUILD_DIR_APP }} --config ${{ matrix.build_configuration }} --target package
          sudo cmake --install ${{ env.BUILD_DIR_APP }}

      - name: run ctest
        run: |
          ctest --test-dir ${{ env.BUILD_DIR_APP }} --output-on-failure -C "${{ matrix.build_configuration }}" --output-junit junit.xml

      - name: Report Test results
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: ctest Tests
          path: ${{ env.BUILD_DIR_APP }}/junit.xml
          reporter: java-junit


  build_macos:

    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        build_configuration: [Release]
        build_platform: ["Ninja"]

    steps:
      - uses: actions/checkout@v7

      - name: install llhttp
        run: |
             brew install llhttp

      - name: install ninja
        run: |
             brew install ninja

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.*'
          modules: 'qtscxml qtwebsockets qtshadertools qtconnectivity qtimageformats'

      - name: generate cmake
        run: |
          export OPENSSL_ROOT=/usr/local/opt/openssl/bin
          export LDFLAGS=-L/usr/local/opt/openssl/lib
          export CPPFLAGS=-I/usr/local/opt/openssl/include
          export PKG_CONFIG_PATH=/usr/local/opt/openssl/lib/pkgconfig/
          cmake -G "${{ matrix.build_platform }}" -DCMAKE_BUILD_TYPE="${{ matrix.build_configuration }}" -B ${{ env.BUILD_DIR_APP }}

      - name: build cmake
        run: |
          cmake --build ${{ env.BUILD_DIR_APP }} --config ${{ matrix.build_configuration }}

      - name: run ctest
        run: |
          ctest --test-dir ${{ env.BUILD_DIR_APP }} --output-on-failure -C "${{ matrix.build_configuration }}" --output-junit junit.xml

      - name: Report Test results
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: ctest Tests
          path: ${{ env.BUILD_DIR_APP }}/junit.xml
          reporter: java-junit
