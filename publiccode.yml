description:
  de:
    genericName: eID-Client
    shortDescription: >-
      Der offizielle eID-Client des Bundes.
    longDescription: >
      Die AusweisApp ist eine Open-Source-Anwendung zur Nutzung der
      Online-Ausweisfunktion (eID) des deutschen Personalausweises, des
      elektronischen Aufenthaltstitels sowie der eID-Karte für
      EU-/EWR-Bürgerinnen und -Bürger.

      Sie ermöglicht eine sichere Authentisierung gegenüber Online-Diensten von
      Behörden und Unternehmen. Die Kommunikation erfolgt verschlüsselt nach den
      Vorgaben des Bundesamts für Sicherheit in der Informationstechnik (BSI).

      Die Anwendung unterstützt NFC-fähige Smartphones sowie Kartenlesegeräte am
      Desktop und steht für Windows, macOS, iOS, Android und inoffiziell für Linux
      zur Verfügung.
    features:
      - Nutzung der Online-Ausweisfunktion (eID)
      - Unterstützung von NFC-Schnittstellen
      - Integration externer Kartenlesegeräte
      - Plattformübergreifende Verfügbarkeit
      - Open-Source-Entwicklung
